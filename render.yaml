services:
  - type: web
    name: petadopt-backend
    env: docker
    plan: free
    dockerContext: backend
    dockerfilePath: Dockerfile
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: ConnectionStrings__DefaultConnection
        sync: false # User will provide this in Render dashboard
      - key: JWT__Key
        sync: false # User will provide this in Render dashboard
      - key: AppSettings__Issuer
        value: MyAwesomeApp
      - key: AppSettings__Audience
        value: MyAwesomeAudience
